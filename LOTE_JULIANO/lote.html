<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Lotes</title>
    <!-- Ícono -->
    <link rel="icon" type="image/png" href="img/favicon.svg">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap -->
    <link rel="stylesheet" href="./libs/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="./libs/bootstrap-icons/bootstrap-icons.css">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="css/estilos.css" />

</head>

<body class="bg-light">
    <!-- ---------- ENCABEZADO ---------- -->
    <header class="header py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <figure class="m-0 d-flex align-items-center">
                <img src="img/logo.png" alt="Logo de la empresa" width="70" height="70" class="me-2" />
                <figcaption class="fw-bold text-uppercase">
                    ORGANIZACIÓN<br />CÁRDENAS S.A.S
                </figcaption>
            </figure>

            <div class="text-end">
                <h1 class="h3 mb-0">INGRESO</h1>
                <h2 class="h5 text-secondary">SKU</h2>
            </div>
        </div>

    </header>

    <!-- ---------- CONTENIDO PRINCIPAL ---------- -->
    <main id="contenedorPrincipal" class="container my-4">
        <!-- Formulario -->
        <form id="formulario" class="card shadow p-4" onsubmit="return false;">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">SKU</label>
                    <input id="codigo" type="text" class="form-control" placeholder="Escanea SKU" />
                </div>

                <div class="col-md-3">
                    <label class="form-label">Consecutivo</label>
                    <select id="consecutivoLote" class="form-select"></select>
                </div>
                <strong>📦 Lote : <span id="labelLoteValor"></span> </strong>
 <input id="inputLote" type="hidden" />
<div id="labelLote" class="d-flex justify-content-center align-items-center">
  <div id="qrPrint" class="border rounded p-3 bg-white"></div>
</div>  
    <button id="btnImprimirQR" class="btn btn-outline-primary w-100 mt-2"> 🖨️ Imprimir QR </button>

    <button id="btnDescargarPDF" class="btn btn-success w-100 mt-2">
  ⬇️ Descargar etiqueta en PDF
</button>
            </div>
        </form>
    </main>

    <!-- ---------- FOOTER ---------- -->

    <footer class="text-center py-3 mt-4 border-top">
        <p id="estado" class="text-muted small mb-0"></p>
        <p class="text-muted small mb-0">
            Desarrollado por <strong>JORGE LEONARDO RODRIGUEZ</strong>
        </p>
    </footer>

    <!-- Bootstrap -->

    <script src="./libs/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="./libs/chart.umd.min.js"></script>

    <!-- Chart.js DataLabels -->
    <script src="./libs/chartjs-plugin-datalabels.min.js"></script>

    <!-- jsPDF -->
    <script src="./libs/jspdf.umd.min.js"></script>

    <!-- HTML5 QR -->
    <script src="./libs/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>



    <!-- MAIN -->

    <script type="module" src="./js/sku/main.js"></script>

    <!-- Loader global -->
    <div id="loaderOverlay">
        <div class="spinner-border text-primary loaderSpinner"></div>
    </div>

    <div id="loaderOverlay2">
        <div class="loader2-container">
            <span id="loaderProgress2">Preparando...</span>

            <div class="progressBar2">
                <div class="progressBar2-fill"></div>
            </div>
        </div>
    </div>

</body>


</html>
